name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to attach builds to (e.g. v1.4)'
        required: true
        default: 'v1.4'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (WPF)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows exe
        run: dotnet publish HamsterWeazle/HamsterWeazle.csproj -c Release -o dist-win

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: dist-win/HamsterWeazle.exe

  build-mac:
    name: macOS (Avalonia)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Mac (Intel)
        run: dotnet publish Mac/HamsterWeazle.csproj -c Release -r osx-x64 --self-contained -o dist-mac-x64

      - name: Publish Mac (Apple Silicon)
        run: dotnet publish Mac/HamsterWeazle.csproj -c Release -r osx-arm64 --self-contained -o dist-mac-arm64

      - name: Rename Mac binaries
        run: |
          mv dist-mac-x64/HamsterWeazle dist-mac-x64/HamsterWeazle-osx-x64
          mv dist-mac-arm64/HamsterWeazle dist-mac-arm64/HamsterWeazle-osx-arm64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            dist-mac-x64/HamsterWeazle-osx-x64
            dist-mac-arm64/HamsterWeazle-osx-arm64
