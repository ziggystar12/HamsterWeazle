name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to attach builds to (e.g. v1.4)'
        required: true
        default: 'v1.4'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (WPF)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows exe
        run: dotnet publish HamsterWeazle/HamsterWeazle.csproj -c Release -o dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: dist/HamsterWeazle.exe

  build-mac:
    name: macOS (Avalonia)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Mac (Intel)
        working-directory: Mac
        run: bash build_mac.sh osx-x64

      - name: Build Mac (Apple Silicon)
        working-directory: Mac
        run: bash build_mac.sh osx-arm64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            dist/HamsterWeazle-Mac-Intel.zip
            dist/HamsterWeazle-Mac-AppleSilicon.zip
